model:
  hidden_channels: 256
  batch_size: 16
  edge_attrs: true
  edge_types:
    - ["aa", "close_to", "aa"]
    - ["aa", "belongs_to", "protein"]
    #- ["protein", "aligned_with", "protein"]
    #- ["protein", "stringdb", "protein"]

  # How many edges to sample to build mini-batch subgraphs. Follows PyG nomenclature
  sampled_edges:
    protein__aligned_with__protein: 0
    # protein__stringdb__protein: 30

trainer:
  epochs: 6
  device: cuda
  compile: false  # Whether to use torch.compile
  num_workers: 4

optimizer:
  type: Adam
  lr: 0.001

scheduler:
  type: StepLR
  step_size: 1
  gamma: 0.5

data:
  dataset: 'D1'
  subontology: 'MFO'
  train_on_swissprot: false  # Override original train dataset to train on SwissProt instead. Ignored if dataset is already SwissProt.
  #swissprot_release: '2017_01'  # SwissProt release used when training on SwissProt
  #exp_only: true  # If training on SwissProt, whether to use only experimental annotations

  external_annotations_path: ./data/swissprot/2022_01/swissprot_2022_01_MFO_exp_annotations.tsv

  alignment_path: ./data/swissprot/2024_01/diamond_swissprot_2024_01_alignment.tsv
  protein_graphs: ./data/swissprot/2024_01/protein_graphs
  stringdb_path: ./data/swissprot/2024_01/swissprot_stringdb.tsv

run:
  qualifier: GNN_NOSYS_CONTACT_ATTR  # Additional string to append to run_id for uniqueness
  save_predictions:
    val: false
    test: true
  test_only: true  # Whether to run evaluation only on the test set (no validation)
  save_epoch_checkpoints: true  # Whether to save checkpoint for each epoch (in addition to latest)
  run_beprof_eval: true
  run_cafa_eval: true
  project_path: "/lustre/fsn1/projects/rech/dqy/uki62ne/tempdata/PFP_layer"
